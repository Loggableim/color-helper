name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub deprecation warning: actions/checkout@v4, actions/setup-node@v4,
# cloudflare/wrangler-action@v3 laufen auf Node 20, das ab 16.06.2026 deprecated.
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 erzwingt Node 24 auf allen Actions.
# Sobald alle Actions Node 24 unterstützen (oder v5/v6 geupdatet werden), kann
# dieser env-Wert entfernt werden.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=color-helper --commit-dirty=true
          workingDirectory: .

      - name: Submit URLs to IndexNow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/indexnow-submit.mjs
        env:
          INDEXNOW_KEY: a28f2699c1dd4b92bf5de35fa41cc70b