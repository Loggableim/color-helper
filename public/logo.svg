<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="75%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <!-- Soft outer glow -->
  <rect x="3" y="3" width="74" height="74" rx="19" fill="url(#lg)" opacity="0.06"/>
  <!-- Rounded square base -->
  <rect x="7" y="7" width="66" height="66" rx="17" fill="url(#lg)"/>
  <!-- White inset surface -->
  <rect x="13" y="13" width="54" height="54" rx="13" fill="white"/>
  <!-- Inner gradient surface -->
  <rect x="15" y="15" width="50" height="50" rx="12" fill="url(#lg)" opacity="0.92"/>
  <!-- Minimalist eyedropper icon (white) -->
  <g fill="white">
    <rect x="38" y="28" width="4" height="18" rx="2"/>
    <ellipse cx="40" cy="28" rx="5.5" ry="4"/>
    <path d="M36 46 L40 55 L44 46" stroke="white" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  </g>
  <!-- Subtle color dot accent -->
  <circle cx="53" cy="52" r="4.5" fill="white" opacity="0.35"/>
  <circle cx="53" cy="52" r="4.5" fill="url(#lg)" clip-path="inset(0 0 50% 0)"/>
</svg>
