<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="33%" stop-color="#7C3AED"/>
      <stop offset="66%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <radialGradient id="highlight" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bgGrad)"/>
  <circle cx="16" cy="16" r="15" fill="url(#highlight)"/>

  <!-- Pipette Icon (simplified for small size) -->
  <g fill="white">
    <!-- Tip -->
    <path d="M16,28 L14,22 L18,22 Z"/>

    <!-- Shaft -->
    <rect x="14" y="12" width="4" height="10" rx="0.5"/>

    <!-- Bulb -->
    <rect x="11" y="7" width="10" height="6" rx="3"/>

    <!-- Plunger -->
    <rect x="14.5" y="4" width="3" height="3" rx="1.5"/>
  </g>
</svg>
